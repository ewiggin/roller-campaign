<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-[#09090b] px-4">
  <div class="w-full max-w-sm">
    <div
      class="rounded-xl border border-gray-200 dark:border-zinc-800 bg-white dark:bg-[#18181b] shadow-sm overflow-hidden"
    >
      <div
        class="px-5 py-4 bg-gray-50 dark:bg-[#27272a] border-b border-gray-200 dark:border-zinc-700"
      >
        <h1 class="text-sm font-semibold text-gray-700 dark:text-zinc-200 uppercase tracking-wide">
          Roller Campaign — Admin
        </h1>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="p-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-zinc-300 mb-1">
            Email
          </label>
          <input
            formControlName="email"
            type="email"
            autocomplete="email"
            placeholder="admin@example.com"
            class="w-full rounded-lg border border-gray-300 dark:border-zinc-700 bg-white dark:bg-[#27272a] text-gray-900 dark:text-zinc-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-400 dark:placeholder-zinc-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-zinc-300 mb-1">
            Contraseña
          </label>
          <input
            formControlName="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full rounded-lg border border-gray-300 dark:border-zinc-700 bg-white dark:bg-[#27272a] text-gray-900 dark:text-zinc-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-400 dark:placeholder-zinc-500"
          />
        </div>

        @if (error()) {
          <p class="text-sm text-red-500">{{ error() }}</p>
        }

        <button
          type="submit"
          [disabled]="loading() || form.invalid"
          class="w-full rounded-lg bg-blue-500 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          {{ loading() ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>
    </div>
  </div>
</div>
