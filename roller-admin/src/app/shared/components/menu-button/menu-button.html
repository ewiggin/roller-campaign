<div class="relative">
  <button
    type="button"
    (click)="toggle()"
    class="inline-flex items-center gap-1.5 rounded-lg px-3 py-2 text-sm font-medium text-gray-600 dark:text-zinc-300 border border-gray-300 dark:border-zinc-700 hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors"
  >
    {{ label() }}
    <svg
      class="w-3.5 h-3.5 transition-transform duration-150"
      [class.rotate-180]="open()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2.5"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>
  @if (open()) {
    <div
      class="absolute right-0 mt-1 z-50 min-w-[180px] rounded-xl border border-gray-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 shadow-lg overflow-hidden"
    >
      @for (item of items(); track item.label) {
        <button
          type="button"
          (click)="run(item)"
          [disabled]="item.disabled"
          class="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-zinc-200 hover:bg-gray-50 dark:hover:bg-zinc-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        >
          {{ item.label }}
        </button>
      }
    </div>
  }
</div>
