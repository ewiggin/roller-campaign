name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Backend e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: development
          PORT: 3000
          DATABASE_PATH: ':memory:'
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 6h
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: adminpass123
          RAILWAY_BUCKET_NAME: ci-dummy-bucket
          RAILWAY_BUCKET_ENDPOINT: https://dummy.storage.example.com
          RAILWAY_BUCKET_REGION: us-east-1
          RAILWAY_ACCESS_KEY_ID: ci-dummy-key
          RAILWAY_SECRET_ACCESS_KEY: ci-dummy-secret
        run: npm test
