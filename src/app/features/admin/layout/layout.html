<div class="flex h-screen bg-gray-100 dark:bg-[#09090b]">
  <!-- Sidebar -->
  <aside
    class="w-56 flex-shrink-0 flex flex-col bg-white dark:bg-[#18181b] border-r border-gray-200 dark:border-zinc-800"
  >
    <div class="px-5 py-4 border-b border-gray-200 dark:border-zinc-800">
      <span class="text-sm font-bold text-gray-900 dark:text-zinc-100 tracking-tight"
        >Roller Admin</span
      >
    </div>

    <nav class="flex-1 overflow-y-auto py-3">
      <ul class="space-y-0.5 px-2">
        @for (item of navItems(); track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="bg-blue-50 dark:bg-blue-950 text-blue-600 dark:text-blue-400"
              [routerLinkActiveOptions]="{ exact: false }"
              class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-zinc-400 hover:bg-gray-50 dark:hover:bg-zinc-800 hover:text-gray-900 dark:hover:text-zinc-100 transition-colors"
            >
              {{ item.label }}
            </a>
          </li>
        }
        @if (isSuperAdmin()) {
          <li class="pt-3 mt-3 border-t border-gray-100 dark:border-zinc-800">
            @for (item of adminNavItems; track item.path) {
              <a
                [routerLink]="item.path"
                routerLinkActive="bg-blue-50 dark:bg-blue-950 text-blue-600 dark:text-blue-400"
                [routerLinkActiveOptions]="{ exact: false }"
                class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-zinc-400 hover:bg-gray-50 dark:hover:bg-zinc-800 hover:text-gray-900 dark:hover:text-zinc-100 transition-colors"
              >
                {{ item.label }}
              </a>
            }
          </li>
        }
      </ul>
    </nav>

    <div class="px-4 py-3 border-t border-gray-200 dark:border-zinc-800">
      <p class="text-xs text-gray-400 dark:text-zinc-500 truncate mb-2">{{ userEmail() }}</p>
      <button
        (click)="logout()"
        class="w-full rounded-lg px-3 py-1.5 text-xs font-medium text-gray-500 dark:text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-950 transition-colors text-left"
      >
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top bar -->
    <header
      class="h-14 flex items-center justify-end px-5 bg-white dark:bg-[#18181b] border-b border-gray-200 dark:border-zinc-800"
    >
      <button
        (click)="theme.toggle()"
        class="p-1.5 rounded-md text-gray-400 dark:text-zinc-500 hover:text-gray-700 dark:hover:text-zinc-200 hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors"
        title="Toggle dark mode"
      >
        @if (theme.isDark()) {
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z"
            />
          </svg>
        } @else {
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        }
      </button>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>
