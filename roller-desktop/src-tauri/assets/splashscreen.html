<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #18181b;
        color: #f4f4f5;
        user-select: none;
      }
      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(244, 244, 245, 0.2);
        border-top-color: #f4f4f5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .subtitle {
        font-size: 13px;
        color: #a1a1aa;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="title">Roller Admin</div>
      <div class="spinner"></div>
      <div class="subtitle">Starting up&hellip;</div>
    </div>
  </body>
</html>
