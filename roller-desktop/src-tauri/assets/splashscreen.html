<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #18181b;
        user-select: none;
        overflow: hidden;
      }
      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .logo {
        width: 220px;
        height: auto;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid rgba(244, 244, 245, 0.15);
        border-top-color: rgba(244, 244, 245, 0.7);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        color: #52525b;
        letter-spacing: 0.05em;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
