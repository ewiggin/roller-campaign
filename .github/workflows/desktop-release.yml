# Builds the Roller Admin desktop installers (Windows .msi, macOS .dmg)
# in parallel and uploads them to a GitHub Release.
#
# Trigger: push a tag like `desktop-v0.1.0`, or run manually from the
# Actions tab (workflow_dispatch). The release is created automatically
# with the version from roller-desktop/src-tauri/tauri.conf.json.
#
# Required repository secrets:
#   ROLLER_ADMIN_EMAIL     superadmin login baked into the desktop binary
#   ROLLER_ADMIN_PASSWORD  superadmin password baked into the desktop binary
#
# The NestJS sidecar embeds a native module (better-sqlite3), so each
# platform MUST build its own sidecar on its own runner — no cross-builds.
name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (aarch64-apple-darwin)
            bundles: dmg
          - platform: windows-latest
            bundles: msi
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            roller-backend/package-lock.json
            roller-admin/package-lock.json
            roller-desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: roller-desktop/src-tauri

      - name: Build NestJS sidecar
        run: |
          npm ci --prefix roller-backend
          npm run build:sidecar --prefix roller-backend

      - name: Install frontend dependencies
        run: |
          npm ci --prefix roller-admin
          npm ci --prefix roller-desktop

      # Runs beforeBuildCommand (Angular desktop build), compiles the Rust
      # shell with the admin credentials baked in via option_env!, bundles
      # the installer and uploads it to the release identified by tagName.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROLLER_ADMIN_EMAIL: ${{ secrets.ROLLER_ADMIN_EMAIL }}
          ROLLER_ADMIN_PASSWORD: ${{ secrets.ROLLER_ADMIN_PASSWORD }}
        with:
          projectPath: roller-desktop
          tagName: desktop-v__VERSION__
          releaseName: 'Roller Admin Desktop v__VERSION__'
          releaseBody: >
            Offline desktop build: Angular admin UI + embedded NestJS API +
            local SQLite database. Download the installer for your platform
            from the assets below.
          releaseDraft: false
          args: --bundles ${{ matrix.bundles }}
